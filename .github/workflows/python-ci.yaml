name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "reference/python/**"
      - "conformance/**"
      - "spec/**"
      - "docs/**"
      - "examples/**"
      - "*.md"
  pull_request:
    branches: [main]
    paths:
      - "reference/python/**"
      - "conformance/**"
      - "spec/**"
      - "docs/**"
      - "examples/**"
      - "*.md"

permissions:
  contents: read

defaults:
  run:
    working-directory: reference/python

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[storage,fastapi,dev]"
      - run: mypy src/qp_capsule/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: pip install -e ".[storage,fastapi,dev]"
      - run: pytest tests/ -v --tb=short --cov=qp_capsule --cov-fail-under=100

  test-golden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[storage,dev]"
      - run: pytest tests/test_golden_fixtures.py -v
